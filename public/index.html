<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Directory</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    header svg {
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
      align-items: stretch;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      margin: 0;
    }

    .stat-card .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f3460;
      line-height: 1;
    }

    .toolbar {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: #0f3460;
    }

    select {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: #0f3460;
    }

    #resultCount {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
    }

    .table-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fb;
      padding: 14px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1.5px solid #eee;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    thead th:hover {
      background: #eef0f4;
    }

    thead th .sort-icon {
      margin-left: 4px;
      opacity: 0.4;
      font-size: 0.7rem;
    }

    thead th.active .sort-icon {
      opacity: 1;
      color: #0f3460;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #f7f8fc;
    }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .name-cell .name {
      font-weight: 600;
    }

    .name-cell .email {
      font-size: 0.8rem;
      color: #888;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 1rem;
    }

    #loadingRow td {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .container {
        padding: 0 12px;
      }

      td:nth-child(4),
      th:nth-child(4),
      td:nth-child(6),
      th:nth-child(6) {
        display: none;
      }
    }


    .primary-btn {
      background: #0f3460;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary-btn:hover {
      background: #0c2b4f;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      width: 520px;
      max-width: 90%;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .close-btn {
      border: none;
      background: none;
      font-size: 22px;
      cursor: pointer;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field label {
      font-size: 0.8rem;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .field input,
    .field select {
      padding: 9px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
    }

    .field input:focus,
    .field select:focus {
      border-color: #0f3460;
      outline: none;
    }

    .form-actions {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }


    .edit-btn {
      border: none;
      background: #b0dcfd;
      color: #1565c0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .edit-btn:hover {
      background: #d6e9fb;
    }

    .delete-btn {
      border: none;
      background-color: #ee4a4a;
      color: #ffffff;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .delete-btn:hover {
      background: #b52a38;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
    }

    .pagination button {
      padding: 8px 14px;
      border: none;
      background: #0f3460;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .pagination button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    #pageIndicator {
      font-size: 0.9rem;
      color: #666;
    }
  </style>
</head>
<div id="employeeModal" class="modal">
  <div class="modal-content">

    <div class="modal-header">
      <h2>Add Employee</h2>
      <button id="closeModalBtn" class="close-btn">&times;</button>
    </div>

    <form id="employeeForm">

      <div class="form-grid">

        <div class="field">
          <label>Name *</label>
          <input type="text" id="name" required>
        </div>

        <div class="field">
          <label>Email *</label>
          <input type="email" id="email" required>
        </div>

        <div class="field">
          <label>Department *</label>
          <select id="department" required>
            <option value="">Select department</option>
          </select>
        </div>

        <div class="field">
          <label>Position *</label>
          <input type="text" id="position" required>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="tel" id="phone" inputmode="numeric" maxlength="15" pattern="[0-9]*" placeholder="Digits only" />
        </div>

        <div class="field">
          <label>Hire Date *</label>
          <input type="date" id="hire_date" required>
        </div>

        <div class="field">
          <label>Salary *</label>
          <input type="number" id="salary" min="0" required>
        </div>

      </div>

      <div class="form-actions">
        <!-- conditional button for form -->
        <button type="submit" id="submitEmployeeBtn" class="primary-btn">Add Employee</button>

        <span id="formMessage"></span>
      </div>

    </form>

  </div>
</div>

<body>

  <header>
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.1)" />
      <circle cx="18" cy="14" r="5" fill="white" opacity="0.9" />
      <path d="M8 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2" stroke-linecap="round"
        opacity="0.9" />
    </svg>
    <div>
      <h1>Employee Directory</h1>
      <p>Manage and view all company employees</p>
    </div>
  </header>

  <div class="container">

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <span class="label">Total Employees</span>
        <span class="value" id="statTotal">—</span>
      </div>
      <div class="stat-card">
        <span class="label">Departments</span>
        <span class="value" id="statDepts">—</span>
      </div>
      <div class="stat-card">
        <span class="label">Avg. Salary</span>
        <span class="value" id="statSalary">—</span>
      </div>
      <div class="stat-card">
        <span class="label" style="display:block;">Salary by Department</span>
        <div style="display:flex; align-items:center; gap:32px; flex-wrap:wrap;">
          <canvas id="salaryPieChart" width="220" height="220"></canvas>
          <div id="pieChartLegend" style="display:flex;flex-direction:column;"></div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search by name, position, or email…" />
      </div>
      <select id="deptFilter">
        <option value="all">All Departments</option>
      </select>
      <button id="openModalBtn" class="primary-btn">+ Add Employee</button>
      <span id="resultCount"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="id">ID <span class="sort-icon">▲</span></th>
            <th data-col="name">Employee <span class="sort-icon">▲</span></th>
            <th data-col="department">Department <span class="sort-icon">▲</span></th>
            <th data-col="position">Position <span class="sort-icon">▲</span></th>
            <th data-col="hire_date">Hire Date <span class="sort-icon">▲</span></th>
            <th data-col="salary">Salary <span class="sort-icon">▲</span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr id="loadingRow">
            <td colspan="7">Loading employees…</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">

      <button id="prevPage">Previous</button>

      <span id="pageIndicator"></span>

      <button id="nextPage">Next</button>

    </div>
  </div>

  <script>
    const DEPT_COLORS = {
      'Engineering': ['#e8f4fd', '#1565c0'],
      'Marketing': ['#fce4ec', '#c2185b'],
      'HR': ['#e8f5e9', '#2e7d32'],
      'Finance': ['#fff8e1', '#f57f17'],
      'Design': ['#f3e5f5', '#6a1b9a'],
    };

    const AVATAR_COLORS = ['#e63946', '#2196f3', '#4caf50', '#ff9800', '#9c27b0', '#00bcd4', '#795548', '#607d8b', '#f06292', '#26a69a'];

    let sortCol = 'id';
    let sortOrder = 'asc';
    let allEmployees = [];

    // new variables at the top
    let formMode = "create";
    let editingEmployeeId = null;

    let currentPage = 1;
    const rowsPerPage = 5;
    let totalPages = 1;


    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    function initials(name) {
      return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
    }

    function deptBadge(dept) {
      const [bg, text] = DEPT_COLORS[dept] || ['#e0e0e0', '#555'];
      return `<span class="badge" style="background:${bg};color:${text}">${dept}</span>`;
    }

    function formatDate(d) {
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function formatSalary(n) {
      return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
    }

    function renderTable(employees) {
      const tbody = document.getElementById('tableBody');
      document.getElementById('resultCount').textContent = `${employees.length} result${employees.length !== 1 ? 's' : ''}`;

      if (employees.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <p>No employees match your search.</p>
        </div>
      </td></tr>`;
        return;
      }

      tbody.innerHTML = employees.map(emp => `
      <tr>
        <td style="color:#aaa;font-size:0.82rem">#${emp.id}</td>
        <td>
          <div class="name-cell">
            <div class="avatar" style="background:${avatarColor(emp.name)}">${initials(emp.name)}</div>
            <div>
              <div class="name">${emp.name}</div>
              <div class="email">${emp.email}</div>
            </div>
          </div>
        </td>
        <td>${deptBadge(emp.department)}</td>
        <td>${emp.position}</td>
        <td>${formatDate(emp.hire_date)}</td>
        <td style="font-weight:600">${formatSalary(emp.salary)}</td>
        <td>
  <button class="edit-btn" data-id="${emp.id}">Edit</button>
  <button class="delete-btn" data-id="${emp.id}">Delete</button>

  
</td>
      </tr>
    `).join('');
    }

    function updateSortHeaders() {
      document.querySelectorAll('thead th[data-col]').forEach(th => {
        const col = th.dataset.col;
        th.classList.toggle('active', col === sortCol);
        const icon = th.querySelector('.sort-icon');
        if (!icon) return;
        if (col === sortCol) {
          icon.textContent = sortOrder === 'asc' ? '▲' : '▼';
        } else {
          icon.textContent = '▲';
        }
      });
    }

    async function loadDepartments() {
      const res = await fetch('/api/departments');
      const depts = await res.json();

      const filterSel = document.getElementById('deptFilter');
      const formSel = document.getElementById('department');

      depts.forEach(d => {

        const opt1 = document.createElement('option');
        opt1.value = d;
        opt1.textContent = d;
        filterSel.appendChild(opt1);

        const opt2 = document.createElement('option');
        opt2.value = d;
        opt2.textContent = d;
        formSel.appendChild(opt2);

      });

      document.getElementById('statDepts').textContent = depts.length;
    }

    async function loadEmployees() {
      const search = document.getElementById('searchInput').value;
      const department = document.getElementById('deptFilter').value;


      const params = new URLSearchParams({
        search,
        department,
        sort: sortCol,
        order: sortOrder,
        page: currentPage,
        limit: rowsPerPage
      });

      const res = await fetch(`/api/employees?${params}`);
      const result = await res.json();
      allEmployees = result.data;   // only the array
      totalPages = result.totalPages; // update total pages
      updatePagination();           // update buttons and indicator
      renderTable(allEmployees);


      // adding pie chart here
      drawPieChart();
    }

    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) {
          sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col;
          sortOrder = 'asc';
        }
        updateSortHeaders();
        loadEmployees();
      });
    });

    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadEmployees, 250);
    });

    document.getElementById('deptFilter').addEventListener('change', loadEmployees);

    updateSortHeaders();
    loadStats();
    loadDepartments();
    loadEmployees();


    //new changes

    // Task 1 -Add employee modal logic
    const modal = document.getElementById("employeeModal");
    const openBtn = document.getElementById("openModalBtn");
    const closeBtn = document.getElementById("closeModalBtn");
    const submitEmployeeBtn = document.getElementById("submitEmployeeBtn");

    function updateSubmitButtonLabel() {
      submitEmployeeBtn.textContent = formMode === "edit" ? "Update Employee" : "Add Employee";
    }

    closeBtn.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.classList.remove("active");
      }
    });

    // Add employee form submission logic
    document.getElementById("employeeForm").addEventListener("submit", async (e) => {

      e.preventDefault();

      const message = document.getElementById("formMessage");
      message.textContent = "";

      const employee = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        department: document.getElementById("department").value,
        position: document.getElementById("position").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        hire_date: document.getElementById("hire_date").value,
        salary: document.getElementById("salary").value
      };

      try {

        let url = "/api/employees";
        let method = "POST";

        if (formMode === "edit") {
          url = `/api/employees/${editingEmployeeId}`;
          method = "PUT";
        }

        const res = await fetch(url, {
          method,
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(employee)
        });

        const data = await res.json();

        if (!res.ok) {
          message.style.color = "#c62828";
          message.textContent = data.error || "Failed to add employee.";
          return;
        }

        message.style.color = "#2e7d32";
        message.textContent = formMode === "edit"
          ? "Employee updated successfully."
          : "Employee added successfully.";
        modal.classList.remove("active");

        document.getElementById("employeeForm").reset();

        loadEmployees();
        loadStats();

      } catch (err) {

        message.style.color = "#c62828";
        message.textContent = "Server error. Please try again.";

      }

    });

    //phone input validation to allow only digits
    const phoneInput = document.getElementById("phone");

    phoneInput.addEventListener("input", () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, "");
    });

    // Task 2 -Edit button logic
    document.addEventListener("click", async (e) => {

      if (!e.target.classList.contains("edit-btn")) return;

      const id = e.target.dataset.id;

      const employee = allEmployees.find(emp => emp.id == id);

      if (!employee) return;

      formMode = "edit";
      editingEmployeeId = id;

      document.querySelector(".modal-header h2").textContent = "Edit Employee";
      updateSubmitButtonLabel();

      document.getElementById("name").value = employee.name;
      document.getElementById("email").value = employee.email;
      document.getElementById("department").value = employee.department;
      document.getElementById("position").value = employee.position;
      document.getElementById("phone").value = employee.phone || "";
      document.getElementById("hire_date").value = employee.hire_date;
      document.getElementById("salary").value = employee.salary;

      modal.classList.add("active");

    });

    // Reset form and state when opening modal for creating new employee
    openBtn.addEventListener("click", () => {

      formMode = "create";
      editingEmployeeId = null;

      document.querySelector(".modal-header h2").textContent = "Add Employee";
      updateSubmitButtonLabel();

      document.getElementById("employeeForm").reset();
      document.getElementById("formMessage").textContent = "";

      modal.classList.add("active");

    });


    // Task 3 - Delete button logic
    document.addEventListener("click", async (e) => {

      if (!e.target.classList.contains("delete-btn")) return;

      const id = e.target.dataset.id;

      const confirmDelete = confirm("Are you sure you want to delete this employee?");

      if (!confirmDelete) return;

      try {

        const res = await fetch(`/api/employees/${id}`, {
          method: "DELETE"
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || "Failed to delete employee.");
          return;
        }

        loadEmployees();
        loadStats();

      } catch (err) {

        alert("Server error.");

      }

    });


    // Task 4 - Pagination logic
    function updatePagination() {
      document.getElementById("pageIndicator").textContent =
        `Page ${currentPage} of ${totalPages}`;

      document.getElementById("prevPage").disabled = currentPage === 1;
      document.getElementById("nextPage").disabled = currentPage === totalPages;
    }
    // Pagination Buttons
    document.getElementById("prevPage").addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        loadEmployees();
      }
    });

    document.getElementById("nextPage").addEventListener("click", () => {
      if (currentPage < totalPages) {
        currentPage++;
        loadEmployees();
      }
    });

    // reset page on search 
    // Search input
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        currentPage = 1;
        loadEmployees();
      }, 250);
    });

    // Department filter
    document.getElementById('deptFilter').addEventListener('change', () => {
      currentPage = 1;
      loadEmployees();
    });

    // Task 5 - Salary distribution pie chart
    async function drawPieChart() {
      const res = await fetch('/api/salary-by-department');
      const data = await res.json();

      const canvas = document.getElementById('salaryPieChart');
      const ctx = canvas.getContext('2d');
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = 90;
      const total = data.reduce((sum, d) => sum + d.total, 0);
      const colors = ['#1565c0', '#c2185b', '#2e7d32', '#f57f17', '#6a1b9a'];

      let angle = -Math.PI / 2;

      data.forEach((dept, i) => {
        const slice = (dept.total / total) * 2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, angle, angle + slice);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        angle += slice;
      });
    }

    // to get stats for all employees 
    async function loadStats() {
      const res = await fetch('/api/stats');
      const { total, avgSalary } = await res.json();
      document.getElementById('statTotal').textContent = total;
      document.getElementById('statSalary').textContent = '$' + Math.round(avgSalary / 1000) + 'k';
    }

  </script>
